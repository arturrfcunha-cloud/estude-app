<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estude. — Plataforma de Estudos</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C1814">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Estude.">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<meta name="description" content="Plataforma de estudos com flashcards, simulados e IA.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1C1814;--ink-2:#3D3630;--ink-3:#6B6259;--paper:#FAF8F4;--cream:#F2EDE4;--mist:#E8E2D8;
  --amber:#C97B1A;--amber-l:#FDF3E0;--amber-m:#F0B84E;--amber-d:#8A520E;
  --sage:#3D6B4F;--sage-l:#E8F3ED;--sage-d:#254030;
  --clay:#B5472A;--clay-l:#FAEAE6;--clay-d:#7A2E1A;
  --slate:#4A5C72;--slate-l:#EAF0F7;--slate-d:#2C3A48;
  --f-display:'Playfair Display',Georgia,serif;--f-body:'DM Sans',system-ui,sans-serif;--f-mono:'DM Mono','Fira Code',monospace;
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--s7:48px;--s8:64px;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r24:24px;--pill:999px;
  --shadow:0 1px 3px rgba(28,24,20,.08),0 4px 12px rgba(28,24,20,.06);
  --shadow-lg:0 4px 8px rgba(28,24,20,.08),0 16px 40px rgba(28,24,20,.12);
  --transition:all .15s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--f-body);font-size:15px;color:var(--ink);background:var(--paper);line-height:1.6}

/* ── Onboarding ── */
.onboarding{position:fixed;inset:0;background:var(--paper);z-index:999;display:flex;align-items:center;justify-content:center}
.onboarding.hidden{display:none}
.onboard-card{max-width:480px;width:90%;text-align:center}
.onboard-logo{font-family:var(--f-display);font-size:42px;font-weight:700;margin-bottom:var(--s2)}
.onboard-logo span{color:var(--amber)}
.onboard-sub{color:var(--ink-3);font-size:14px;margin-bottom:var(--s7)}
.onboard-step{display:none}
.onboard-step.active{display:block}
.course-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s3);text-align:left;margin:var(--s5) 0}
.course-option{padding:var(--s4);border:1.5px solid var(--mist);border-radius:var(--r12);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:var(--s3)}
.course-option:hover{border-color:var(--ink-3);background:var(--cream)}
.course-option.selected{border-color:var(--amber);background:var(--amber-l)}
.course-option .co-icon{font-size:24px;width:40px;height:40px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;background:var(--cream);flex-shrink:0}
.course-option.selected .co-icon{background:var(--amber);color:white}
.course-option .co-name{font-weight:500;font-size:14px}
.course-option .co-desc{font-size:11px;color:var(--ink-3)}

/* ── Layout ── */
.app-layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.app-layout.hidden{display:none}
.sidebar{background:var(--cream);border-right:1px solid var(--mist);padding:var(--s5);position:fixed;top:0;left:0;width:240px;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{font-family:var(--f-display);font-size:26px;font-weight:700;margin-bottom:var(--s1)}
.sidebar-logo span{color:var(--amber)}
.sidebar-tagline{font-size:11px;color:var(--ink-3);margin-bottom:var(--s5)}
.sidebar-nav{flex:1}
.nav-group{margin-bottom:var(--s4)}
.nav-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);padding:0 var(--s3);margin-bottom:var(--s2);display:block}
.nav-item{display:flex;align-items:center;gap:var(--s3);padding:9px var(--s3);border-radius:var(--r8);font-size:13px;color:var(--ink-3);cursor:pointer;transition:var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--f-body)}
.nav-item:hover{background:var(--mist);color:var(--ink)}
.nav-item.active{background:var(--ink);color:var(--paper)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.nav-item .nav-badge{margin-left:auto;background:var(--amber-l);color:var(--amber-d);font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--pill)}
.sidebar-user{display:flex;align-items:center;gap:var(--s3);padding:var(--s3);border-top:1px solid var(--mist);margin-top:var(--s4)}
.sidebar-avatar{width:36px;height:36px;border-radius:50%;background:var(--amber-l);color:var(--amber-d);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.sidebar-user-name{font-size:13px;font-weight:500}
.sidebar-user-plan{font-size:10px;color:var(--ink-3)}

.main-content{margin-left:240px;min-height:100vh}
.page-header{padding:20px var(--s6);border-bottom:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between;background:var(--paper);position:sticky;top:0;z-index:50}
.page-title{font-family:var(--f-display);font-size:22px;font-weight:700}
.page-subtitle{font-size:13px;color:var(--ink-3);margin-top:2px}
.header-actions{display:flex;gap:var(--s3);align-items:center}
.page-body{padding:var(--s6)}
.page{display:none}.page.active{display:block}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:var(--s2);padding:9px 18px;font-size:13px;font-family:var(--f-body);font-weight:500;border-radius:var(--r8);cursor:pointer;border:1.5px solid transparent;transition:var(--transition);line-height:1;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}.btn-primary:hover{background:var(--ink-2)}
.btn-secondary{background:transparent;color:var(--ink);border-color:var(--mist)}.btn-secondary:hover{background:var(--cream);border-color:var(--ink-3)}
.btn-accent{background:var(--amber);color:white;border-color:var(--amber)}.btn-accent:hover{background:var(--amber-d)}
.btn-ghost{background:transparent;color:var(--ink-3);border-color:transparent}.btn-ghost:hover{background:var(--cream);color:var(--ink)}
.btn-danger{background:transparent;color:var(--clay);border-color:var(--clay)}.btn-danger:hover{background:var(--clay-l)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:15px;border-radius:var(--r12)}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center}

/* ── Cards ── */
.card{background:white;border:1px solid var(--mist);border-radius:var(--r16);padding:var(--s5);box-shadow:var(--shadow);transition:var(--transition)}
.card-clickable{cursor:pointer}.card-clickable:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-accent{border-left:3px solid var(--amber)}
.card-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:var(--s2)}
.card-title{font-family:var(--f-display);font-size:18px;font-weight:700;margin-bottom:var(--s1)}
.card-body{font-size:13px;color:var(--ink-3);line-height:1.6}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:var(--s1);padding:3px 10px;border-radius:var(--pill);font-size:11px;font-weight:500;white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-default{background:var(--cream);color:var(--ink-2)}
.badge-amber{background:var(--amber-l);color:var(--amber-d)}
.badge-sage{background:var(--sage-l);color:var(--sage-d)}
.badge-clay{background:var(--clay-l);color:var(--clay-d)}
.badge-slate{background:var(--slate-l);color:var(--slate-d)}

/* ── Progress ── */
.progress{display:flex;flex-direction:column;gap:var(--s2)}
.progress-header{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-2)}
.progress-track{height:6px;background:var(--cream);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.progress-fill.sage{background:var(--sage)}.progress-fill.amber{background:var(--amber)}.progress-fill.clay{background:var(--clay)}.progress-fill.slate{background:var(--slate)}

/* ── Alerts ── */
.alert{display:flex;gap:var(--s3);padding:var(--s3) var(--s4);border-radius:var(--r12);font-size:13px;line-height:1.5}
.alert-icon{flex-shrink:0;font-size:15px;line-height:1.4}
.alert strong{font-weight:500;display:block;margin-bottom:2px}
.alert-warning{background:var(--amber-l);color:var(--amber-d)}

/* ── Inputs ── */
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:12px;font-weight:500;color:var(--ink-2)}
.input,.select,.textarea{padding:9px 13px;font-size:13px;font-family:var(--f-body);border:1.5px solid var(--mist);border-radius:var(--r8);background:white;color:var(--ink);outline:none;transition:border-color .15s;width:100%}
.input:hover,.select:hover{border-color:var(--ink-3)}
.input:focus,.select:focus,.textarea:focus{border-color:var(--amber)}
.textarea{resize:vertical;min-height:80px;line-height:1.6}

/* ── Tabs ── */
.tabs{display:inline-flex;gap:2px;padding:4px;background:var(--cream);border-radius:var(--r12)}
.tab-btn{padding:7px 16px;font-size:12px;font-weight:500;font-family:var(--f-body);border:none;background:none;cursor:pointer;border-radius:var(--r8);color:var(--ink-3);transition:var(--transition)}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{background:white;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ── Toggle ── */
.toggle{width:40px;height:22px;background:var(--mist);border-radius:11px;cursor:pointer;position:relative;border:none;transition:background .2s;flex-shrink:0}
.toggle.active{background:var(--ink)}
.toggle::after{content:'';width:16px;height:16px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.active::after{left:21px}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(28,24,20,.4);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--paper);border-radius:var(--r24);box-shadow:var(--shadow-lg);max-width:540px;width:90%;padding:var(--s6);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-title{font-family:var(--f-display);font-size:22px;font-weight:700;margin-bottom:var(--s4)}

/* ── Metrics ── */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s4);margin-bottom:var(--s6)}
.metric-card{background:white;border:1px solid var(--mist);border-radius:var(--r16);padding:var(--s5);box-shadow:var(--shadow)}
.metric-card .m-icon{width:40px;height:40px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:var(--s3)}
.metric-card .m-val{font-family:var(--f-display);font-size:32px;font-weight:700;line-height:1;display:block}
.metric-card .m-label{font-size:12px;color:var(--ink-3);margin-top:var(--s2);display:block}
.metric-card .m-trend{font-size:11px;font-weight:500;margin-top:var(--s2);color:var(--sage)}
.dashboard-grid{display:grid;grid-template-columns:1fr 340px;gap:var(--s5)}

/* ── Subject cards ── */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--s4)}
.subject-full-card{background:white;border:1px solid var(--mist);border-radius:var(--r16);overflow:hidden;box-shadow:var(--shadow);transition:var(--transition)}
.subject-full-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.sf-header{padding:var(--s5);display:flex;align-items:center;gap:var(--s4);cursor:pointer}
.sf-icon{width:52px;height:52px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sf-body{padding:0 var(--s5) var(--s5)}
.topic-chip{font-size:11px;padding:3px 10px;border-radius:var(--pill);background:var(--cream);color:var(--ink-3);display:inline-block;margin:2px}
.sf-actions{display:flex;gap:var(--s2);margin-top:var(--s3)}

/* ── Content items ── */
.content-item{background:white;border:1px solid var(--mist);border-radius:var(--r12);padding:var(--s4);margin-bottom:var(--s3);display:flex;align-items:flex-start;gap:var(--s3)}
.content-item:hover{border-color:var(--ink-3)}

/* ── Week chart ── */
.week-chart{display:flex;align-items:flex-end;gap:var(--s2);height:120px;padding-top:var(--s4)}
.wc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:var(--s2);height:100%}
.wc-val{font-size:10px;font-family:var(--f-mono);color:var(--ink-3)}
.wc-track{flex:1;width:100%;display:flex;align-items:flex-end}
.wc-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .6s cubic-bezier(.4,0,.2,1)}
.wc-day{font-size:10px;color:var(--ink-3);font-weight:500}

/* ── Activity ── */
.act-item{display:flex;gap:var(--s3);padding:var(--s3) 0;border-bottom:1px solid var(--mist);align-items:flex-start}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}

/* ── Cronograma ── */
.day-row{background:white;border:1px solid var(--mist);border-radius:var(--r12);padding:16px 20px;margin-bottom:var(--s3);display:flex;align-items:center;justify-content:space-between}
.day-info .day-name{font-weight:500;font-size:14px}
.day-info .day-sub{font-size:12px;color:var(--ink-3);margin-top:2px}
.hours-ctrl{display:flex;align-items:center;gap:var(--s3)}
.h-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--mist);background:white;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition);font-family:var(--f-body);color:var(--ink)}
.h-btn:hover{background:var(--cream);border-color:var(--ink-3)}
.h-val{font-family:var(--f-display);font-size:28px;font-weight:700;width:44px;text-align:center;line-height:1}
.h-unit{font-size:11px;color:var(--ink-3);text-align:center}

/* ── Pomodoro ── */
.pomo-wrap{max-width:480px;margin:0 auto;text-align:center}
.pomo-circle{width:280px;height:280px;border-radius:50%;margin:var(--s5) auto;display:flex;align-items:center;justify-content:center;position:relative;background:white;box-shadow:var(--shadow-lg)}
.pomo-ring{position:absolute;inset:-6px;border-radius:50%;z-index:0}
.pomo-inner{position:relative;z-index:1;width:calc(100% - 12px);height:calc(100% - 12px);border-radius:50%;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-time{font-family:var(--f-display);font-size:56px;font-weight:700;line-height:1}
.pomo-mode-label{font-size:13px;color:var(--ink-3);margin-top:var(--s2)}
.pomo-dots{display:flex;gap:var(--s2);justify-content:center;margin-top:var(--s5)}
.pomo-dot{width:12px;height:12px;border-radius:50%;background:var(--cream);border:1.5px solid var(--mist)}
.pomo-dot.done{background:var(--amber);border-color:var(--amber)}
.pomo-dot.now{background:var(--amber-l);border-color:var(--amber)}
.pomo-cfg{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s4);margin-top:var(--s6);text-align:center}
.pomo-cfg .card{padding:var(--s4)}
.pomo-cfg-val{font-family:var(--f-display);font-size:28px;font-weight:700;line-height:1}
.pomo-cfg-label{font-size:11px;color:var(--ink-3);margin-top:var(--s1)}

/* ── Flashcards ── */
.fc-wrap{max-width:600px;margin:0 auto}
.fc-card{background:white;border:1px solid var(--mist);border-radius:var(--r24);box-shadow:var(--shadow-lg);min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--s7);text-align:center;cursor:pointer;position:relative}
.fc-tag{position:absolute;top:var(--s5);left:var(--s5);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
.fc-num{position:absolute;top:var(--s5);right:var(--s5);font-size:12px;font-family:var(--f-mono);color:var(--ink-3)}
.fc-q{font-family:var(--f-display);font-size:22px;font-weight:700;line-height:1.4;max-width:440px}
.fc-a{font-size:16px;color:var(--ink-2);line-height:1.6;max-width:440px;display:none}
.fc-card.flipped .fc-q{display:none}
.fc-card.flipped .fc-a{display:block}
.fc-card.flipped .fc-tag{color:var(--amber)}
.fc-hint{font-size:12px;color:var(--ink-3);margin-top:var(--s4)}
.fc-card.flipped .fc-hint{display:none}
.fc-btns{display:flex;gap:var(--s3);justify-content:center;margin-top:var(--s5)}
.fc-rate{padding:12px 28px;border-radius:var(--r12);font-size:13px;font-weight:500;font-family:var(--f-body);border:1.5px solid;cursor:pointer;transition:var(--transition)}
.fc-rate:active{transform:scale(.96)}
.fc-rate.easy{background:var(--sage-l);color:var(--sage-d);border-color:var(--sage-l)}.fc-rate.easy:hover{background:var(--sage);color:white}
.fc-rate.medium{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber-l)}.fc-rate.medium:hover{background:var(--amber);color:white}
.fc-rate.hard{background:var(--clay-l);color:var(--clay-d);border-color:var(--clay-l)}.fc-rate.hard:hover{background:var(--clay);color:white}

/* ── Quiz ── */
.qz-card{background:white;border:1px solid var(--mist);border-radius:var(--r16);padding:var(--s6);box-shadow:var(--shadow);margin-bottom:var(--s5)}
.qz-num{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);margin-bottom:var(--s3)}
.qz-text{font-size:16px;line-height:1.6;margin-bottom:var(--s5)}
.qz-opts{display:flex;flex-direction:column;gap:var(--s3)}
.qz-opt{display:flex;align-items:flex-start;gap:var(--s3);padding:var(--s4);border:1.5px solid var(--mist);border-radius:var(--r12);cursor:pointer;transition:var(--transition);font-size:14px;line-height:1.5}
.qz-opt:hover{border-color:var(--ink-3);background:var(--cream)}
.qz-opt.selected{border-color:var(--amber);background:var(--amber-l)}
.qz-opt.correct{border-color:var(--sage);background:var(--sage-l)}
.qz-opt.wrong{border-color:var(--clay);background:var(--clay-l)}
.qz-letter{width:28px;height:28px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.qz-opt.selected .qz-letter{background:var(--amber);color:white}
.qz-opt.correct .qz-letter{background:var(--sage);color:white}
.qz-opt.wrong .qz-letter{background:var(--clay);color:white}
.qz-explain{margin-top:var(--s4);padding:var(--s4);background:var(--slate-l);border-radius:var(--r12);font-size:13px;color:var(--slate-d);line-height:1.6;display:none}
.qz-explain.show{display:block}

/* ── Notes ── */
.notes-layout{display:grid;grid-template-columns:260px 1fr;gap:var(--s5);min-height:60vh}
.notes-list{border-right:1px solid var(--mist);padding-right:var(--s5)}
.note-item{padding:var(--s3) var(--s4);border-radius:var(--r12);cursor:pointer;transition:var(--transition);margin-bottom:var(--s2)}
.note-item:hover{background:var(--cream)}
.note-item.active{background:var(--ink);color:var(--paper)}
.note-item .ni-title{font-size:13px;font-weight:500}
.note-item .ni-date{font-size:11px;color:var(--ink-3);margin-top:2px}
.note-item.active .ni-date{color:var(--mist)}
.ne-title{font-family:var(--f-display);font-size:22px;font-weight:700;border:none;outline:none;background:none;color:var(--ink);width:100%;padding:0}
.ne-body{flex:1;border:none;outline:none;font-family:var(--f-body);font-size:15px;line-height:1.8;color:var(--ink);resize:none;min-height:400px;background:none}

/* ── AI Chat ── */
.ai-panel{position:fixed;right:0;top:0;width:380px;height:100vh;background:var(--paper);border-left:1px solid var(--mist);z-index:150;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:var(--shadow-lg)}
.ai-panel.open{transform:translateX(0)}
.ai-header{padding:var(--s4) var(--s5);border-bottom:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-header-title{font-weight:600;font-size:15px;display:flex;align-items:center;gap:var(--s2)}
.ai-messages{flex:1;overflow-y:auto;padding:var(--s5);display:flex;flex-direction:column;gap:var(--s4)}
.ai-msg{max-width:90%;padding:var(--s3) var(--s4);border-radius:var(--r12);font-size:13px;line-height:1.6}
.ai-msg.bot{background:var(--cream);color:var(--ink);align-self:flex-start;border-bottom-left-radius:var(--r4)}
.ai-msg.user{background:var(--ink);color:var(--paper);align-self:flex-end;border-bottom-right-radius:var(--r4)}
.ai-input-area{padding:var(--s4);border-top:1px solid var(--mist);display:flex;gap:var(--s2);flex-shrink:0}
.ai-input{flex:1;padding:10px 14px;border:1.5px solid var(--mist);border-radius:var(--r12);font-size:13px;font-family:var(--f-body);outline:none;background:white;color:var(--ink)}
.ai-input:focus{border-color:var(--amber)}
.ai-send{width:40px;height:40px;border-radius:var(--r12);background:var(--amber);color:white;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.ai-send:hover{background:var(--amber-d)}
.ai-typing{font-size:12px;color:var(--ink-3);padding:0 var(--s4);font-style:italic;display:none}
.ai-typing.show{display:block}

.ai-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--amber);color:white;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);z-index:140;transition:var(--transition)}
.ai-fab:hover{transform:scale(1.08);background:var(--amber-d)}

/* ── Responsive ── */
@media(max-width:1024px){.metrics-grid{grid-template-columns:repeat(2,1fr)}.dashboard-grid{grid-template-columns:1fr}.ai-panel{width:100%}}
@media(max-width:768px){
  .app-layout{grid-template-columns:1fr}
  .sidebar{transform:translateX(-100%);transition:transform .25s ease}.sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}.metrics-grid{grid-template-columns:1fr 1fr}.notes-layout{grid-template-columns:1fr}
  .page-header{padding:var(--s4)}.page-body{padding:var(--s4)}.mobile-menu-btn{display:flex !important}
  .course-grid{grid-template-columns:1fr}
}
.mobile-menu-btn{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--r8);border:1.5px solid var(--mist);background:white;cursor:pointer;font-size:18px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

let subjects = load('subjects', []);

let qzState = {questions:[],cur:0,score:0,timer:null,seconds:0};
let pomoState = {mode:'work',running:false,seconds:0,timer:null,sessions:0,todaySess:0,todayMin:0};
let aiOpen = false;

function persist(){save('subjects',subjects);save('schedule',schedule);save('schedSubs',schedSubs);save('notes',notes);save('pomoCfg',pomoCfg);save('profile',profile)}

// ONBOARDING
// ============================================================
const courseKeys = Object.keys(COURSES);
function initOnboarding(){
  if(profile){document.getElementById('onboarding').classList.add('hidden');document.getElementById('appLayout').classList.remove('hidden');document.getElementById('aiFab').style.display='flex';initApp();return}
  const grid = document.getElementById('courseGrid');
  grid.innerHTML = courseKeys.map(k=>{const c=COURSES[k];return `<div class="course-option" data-course="${k}" onclick="selectCourse('${k}',this)"><div class="co-icon">${c.icon}</div><div><div class="co-name">${c.name}</div></div></div>`}).join('');
}
let selectedCourse = null;
function selectCourse(k,el){selectedCourse=k;document.querySelectorAll('.course-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected')}
function nextStep(n){document.querySelectorAll('.onboard-step').forEach(s=>s.classList.remove('active'));document.getElementById('step'+n).classList.add('active')}
function finishOnboarding(){
  const name=document.getElementById('onbName').value.trim();
  if(!name){document.getElementById('onbName').style.borderColor='var(--clay)';return}
  if(!selectedCourse){alert('Selecione sua área de estudo');return}
  const courseData=COURSES[selectedCourse];
  profile={name,course:selectedCourse,courseName:courseData.name};
  subjects=courseData.subjects.map((s,i)=>({id:s.name.toLowerCase().replace(/[^a-z0-9]/g,''),name:s.name,icon:s.icon,color:COLORS[i%COLORS.length],progress:0,topics:s.topics,hours:0,contents:[]}));
  persist();
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('appLayout').classList.remove('hidden');
  document.getElementById('aiFab').style.display='flex';
  initApp();
}

// ============================================================
function initApp(){
  const initials = profile.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sidebarAvatar').textContent=initials;
  document.getElementById('sidebarName').textContent=profile.name;
  document.getElementById('sidebarCourse').textContent=profile.courseName;
  document.getElementById('fcBadge').textContent=getCourseData().flashcards.length;
  initDashboard();
  renderSubjects();
  addAIMessage('bot',`Olá, ${profile.name}! Sou seu assistente de estudos de ${profile.courseName}. Pode me perguntar qualquer dúvida sobre suas matérias.`);
}

function getCourseData(){return COURSES[profile.course]}

function nav(p,btn){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('page-'+p);el.classList.add('active');el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');
  if(btn)btn.classList.add('active');
  document.getElementById('pgTitle').textContent=PT[p][0];document.getElementById('pgSub').textContent=PT[p][1];
  document.getElementById('sidebar').classList.remove('open');
  if(p==='materias'){showMatList();renderSubjects()}
  if(p==='cronograma')renderCrono();
  if(p==='pomodoro')renderPomo();
  if(p==='flashcards')initFC();
  if(p==='simulado')renderQuizStart();
  if(p==='notas')renderNotes();
  if(p==='desempenho')renderPerf();
  if(p==='config')renderConfig();
}

function openSubModal(editId){
  const s=editId?subjects.find(x=>x.id===editId):null;
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-title">${s?'Editar':'Nova'} Matéria</div>
    <div class="field" style="margin-bottom:var(--s4)"><label class="field-label">Nome</label><input class="input" id="subNameIn" value="${s?s.name:''}"></div>
    <div class="field" style="margin-bottom:var(--s4)"><label class="field-label">Ícone (emoji)</label><input class="input" id="subIconIn" value="${s?s.icon:'📚'}" style="width:60px;font-size:24px;text-align:center"></div>
    <div class="field" style="margin-bottom:var(--s5)"><label class="field-label">Tópicos (separados por vírgula)</label><input class="input" id="subTopicsIn" value="${s?s.topics.join(', '):''}"></div>
    <div style="display:flex;gap:var(--s3);justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSub('${editId||''}')">${s?'Salvar':'Adicionar'}</button>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function saveSub(editId){
  const name=document.getElementById('subNameIn').value.trim();if(!name)return;
  const icon=document.getElementById('subIconIn').value.trim()||'📚';
  const topics=document.getElementById('subTopicsIn').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(editId){const s=subjects.find(x=>x.id===editId);if(s){s.name=name;s.icon=icon;if(topics.length)s.topics=topics}}
  else{subjects.push({id:Date.now().toString(),name,icon,color:COLORS[subjects.length%COLORS.length],progress:0,topics,hours:0,contents:[]})}
  persist();renderSubjects();closeModal();
}

      <div style="font-family:var(--f-display);font-size:18px;font-weight:700;margin-bottom:var(--s4)">Distribuir Matérias</div>
      <div id="schedSubGrid">${DK.map(k=>{const a=schedSubs[k]||[];return`<div style="margin-bottom:var(--s4)"><div style="font-weight:500;font-size:13px;margin-bottom:var(--s2)">${DAYS[k]} ${schedule[k]>0?'('+schedule[k]+'h)':'— descanso'}</div>${schedule[k]>0?`<div style="display:flex;flex-wrap:wrap;gap:var(--s2)">${subjects.map(s=>{const sel=a.includes(s.id);return`<button style="padding:4px 12px;border-radius:var(--pill);font-size:11px;font-family:var(--f-body);cursor:pointer;border:1.5px solid ${sel?'var(--'+s.color+')':'var(--mist)'};background:${sel?'var(--'+s.color+'-l)':'white'};color:${sel?'var(--'+s.color+'-d)':'var(--ink-3)'};transition:var(--transition)" onclick="togSchedSub('${k}','${s.id}')">${s.icon} ${s.name}</button>`}).join('')}</div>`:'<span style="font-size:12px;color:var(--ink-3)">—</span>'}</div>`}).join('')}</div>

function adjSched(d,v){schedule[d]=Math.max(0,Math.min(12,(schedule[d]||0)+v));persist();renderCrono()}
function togSchedSub(d,sid){if(!schedSubs[d])schedSubs[d]=[];const a=schedSubs[d];const i=a.indexOf(sid);i>=0?a.splice(i,1):a.push(sid);persist();renderCrono()}

function renderPomo(){
  pomoState.seconds=pomoState.seconds||pomoCfg[pomoState.mode]*60;

  el.innerHTML=`

      <div class="tabs" style="margin:0 auto var(--s4)">
        <button class="tab-btn ${pomoState.mode==='work'?'active':''}" onclick="setPMode('work',this)">Foco</button>
        <button class="tab-btn ${pomoState.mode==='short'?'active':''}" onclick="setPMode('short',this)">Pausa Curta</button>
        <button class="tab-btn ${pomoState.mode==='long'?'active':''}" onclick="setPMode('long',this)">Pausa Longa</button>
      </div>
      <div class="pomo-circle"><div class="pomo-ring" id="pRing" style="background:conic-gradient(var(--amber) 0%,var(--cream) 0%)"></div><div class="pomo-inner"><div class="pomo-time" id="pTime">${fmtPomo(pomoState.seconds)}</div><div class="pomo-mode-label" id="pLabel">${pomoState.mode==='work'?'Foco':pomoState.mode==='short'?'Pausa Curta':'Pausa Longa'}</div></div></div>
      <div style="display:flex;gap:var(--s3);justify-content:center;margin-top:var(--s5)">
        <button class="btn btn-accent btn-lg" id="pStartBtn" onclick="togPomo()">${pomoState.running?'Pausar':'Iniciar'}</button>
        <button class="btn btn-secondary" onclick="rstPomo()">Resetar</button>
      </div>
      <div class="pomo-dots" id="pDots">${[0,1,2,3].map(i=>`<div class="pomo-dot ${i<(pomoState.sessions%4)?'done':i===(pomoState.sessions%4)&&pomoState.mode==='work'?'now':''}"></div>`).join('')}</div>
      <div class="pomo-cfg">
        <div class="card"><div class="pomo-cfg-val">${pomoCfg.work}</div><div class="pomo-cfg-label">min foco</div><div style="display:flex;gap:var(--s2);justify-content:center;margin-top:var(--s3)"><button class="h-btn" onclick="adjPomo('work',-5)">−</button><button class="h-btn" onclick="adjPomo('work',5)">+</button></div></div>
        <div class="card"><div class="pomo-cfg-val">${pomoCfg.short}</div><div class="pomo-cfg-label">min pausa curta</div><div style="display:flex;gap:var(--s2);justify-content:center;margin-top:var(--s3)"><button class="h-btn" onclick="adjPomo('short',-1)">−</button><button class="h-btn" onclick="adjPomo('short',1)">+</button></div></div>
        <div class="card"><div class="pomo-cfg-val">${pomoCfg.long}</div><div class="pomo-cfg-label">min pausa longa</div><div style="display:flex;gap:var(--s2);justify-content:center;margin-top:var(--s3)"><button class="h-btn" onclick="adjPomo('long',-5)">−</button><button class="h-btn" onclick="adjPomo('long',5)">+</button></div></div>
      </div>
      <div class="card" style="margin-top:var(--s5);text-align:left">
        <div class="card-label">Sessão atual</div>
        <div class="field"><label class="field-label">Estudando</label><select class="select" id="pSubSel"><option value="">Selecionar matéria</option>${subjects.map(s=>`<option value="${s.id}">${s.icon} ${s.name}</option>`).join('')}</select></div>
        <div style="display:flex;gap:var(--s4);font-size:13px;color:var(--ink-3);margin-top:var(--s3)"><span>Sessões: <strong style="color:var(--ink)">${pomoState.todaySess}</strong></span><span>Tempo: <strong style="color:var(--ink)">${pomoState.todayMin}min</strong></span></div>
      </div>
    </div>`;
}
function fmtPomo(s){return Math.floor(s/60).toString().padStart(2,'0')+':'+((s%60).toString().padStart(2,'0'))}
function updPomoUI(){
  const te=document.getElementById('pTime');if(!te)return;
  te.textContent=fmtPomo(pomoState.seconds);
  const total=pomoCfg[pomoState.mode]*60;const pct=((total-pomoState.seconds)/total*100);
  const c=pomoState.mode==='work'?'var(--amber)':'var(--sage)';
  document.getElementById('pRing').style.background=`conic-gradient(${c} ${pct}%,var(--cream) 0%)`;
}
function setPMode(m,btn){if(pomoState.running)return;pomoState.mode=m;pomoState.seconds=pomoCfg[m]*60;btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderPomo()}
function togPomo(){
  if(pomoState.running){clearInterval(pomoState.timer);pomoState.running=false;document.getElementById('pStartBtn').textContent='Continuar'}
  else{pomoState.running=true;document.getElementById('pStartBtn').textContent='Pausar';
    pomoState.timer=setInterval(()=>{
      pomoState.seconds--;updPomoUI();
      if(pomoState.seconds<=0){clearInterval(pomoState.timer);pomoState.running=false;
        if(pomoState.mode==='work'){pomoState.sessions++;pomoState.todaySess++;pomoState.todayMin+=pomoCfg.work;alert('Foco concluído! Hora da pausa.');pomoState.mode=pomoState.sessions%4===0?'long':'short'}
        else{alert('Pausa encerrada! Vamos focar.');pomoState.mode='work'}
        pomoState.seconds=pomoCfg[pomoState.mode]*60;renderPomo()}
    },1000)}
}
function rstPomo(){clearInterval(pomoState.timer);pomoState.running=false;pomoState.seconds=pomoCfg[pomoState.mode]*60;renderPomo()}
function adjPomo(t,d){if(pomoState.running)return;pomoCfg[t]=Math.max(1,Math.min(60,pomoCfg[t]+d));if(pomoState.mode===t)pomoState.seconds=pomoCfg[t]*60;persist();renderPomo()}

function renderQuizStart(){
  const el=document.getElementById('qzContent');
  el.innerHTML=`
    <div id="qzStart" style="max-width:600px">
      <div style="font-family:var(--f-display);font-size:24px;font-weight:700;margin-bottom:var(--s2)">Simulado</div>
      <p style="color:var(--ink-3);font-size:14px;margin-bottom:var(--s5)">Questões de ${profile.courseName}</p>
      <div class="field" style="margin-bottom:var(--s5)"><label class="field-label">Quantidade</label><select class="select" id="qzCountSel"><option value="5">5 questões</option><option value="10" selected>10 questões</option></select></div>
      <button class="btn btn-accent btn-lg" onclick="startQz()">Iniciar simulado →</button>
    </div>
    <div id="qzActive" style="display:none"><div style="max-width:680px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s5)"><div class="progress" style="width:300px"><div class="progress-header"><span id="qzPText"></span><span id="qzPPct"></span></div><div class="progress-track"><div class="progress-fill amber" id="qzPBar" style="width:0%"></div></div></div><div class="quiz-timer" id="qzTimer">00:00</div></div><div id="qzArea"></div><div style="display:flex;justify-content:space-between;margin-top:var(--s4)"><button class="btn btn-ghost" id="qzCheckBtn" onclick="checkQz()" style="display:none">Verificar</button><button class="btn btn-primary" id="qzNextBtn" onclick="nextQz()" style="display:none">Próxima →</button></div></div></div>
    <div id="qzResult" style="display:none;text-align:center;padding:var(--s7)"><div class="qz-card" style="max-width:500px;margin:0 auto;text-align:center"><div style="font-size:48px;margin-bottom:var(--s4)">🎉</div><div style="font-family:var(--f-display);font-size:64px;font-weight:700" id="qzScoreVal"></div><div style="font-size:16px;color:var(--ink-3);margin-bottom:var(--s5)" id="qzScoreLabel"></div><div style="display:flex;gap:var(--s4);justify-content:center"><div><div style="font-family:var(--f-display);font-size:24px;font-weight:700;color:var(--sage)" id="qzOk">0</div><div style="font-size:11px;color:var(--ink-3)">Corretas</div></div><div><div style="font-family:var(--f-display);font-size:24px;font-weight:700;color:var(--clay)" id="qzErr">0</div><div style="font-size:11px;color:var(--ink-3)">Erradas</div></div><div><div style="font-family:var(--f-display);font-size:24px;font-weight:700;color:var(--slate)" id="qzTime">0:00</div><div style="font-size:11px;color:var(--ink-3)">Tempo</div></div></div><div style="margin-top:var(--s6);display:flex;gap:var(--s3);justify-content:center"><button class="btn btn-secondary" onclick="renderQuizStart()">Voltar</button><button class="btn btn-accent" onclick="renderQuizStart();startQz()">Novo</button></div></div></div>`;
}
function startQz(){
  const n=parseInt(document.getElementById('qzCountSel').value);let pool=[...getCourseData().quizzes].sort(()=>Math.random()-.5);
  qzState={questions:pool.slice(0,Math.min(n,pool.length)),cur:0,score:0,seconds:0,timer:null};
  document.getElementById('qzStart').style.display='none';document.getElementById('qzActive').style.display='';document.getElementById('qzResult').style.display='none';
  clearInterval(qzState.timer);qzState.timer=setInterval(()=>{qzState.seconds++;document.getElementById('qzTimer').textContent=Math.floor(qzState.seconds/60).toString().padStart(2,'0')+':'+(qzState.seconds%60).toString().padStart(2,'0')},1000);
  showQz();
}
function showQz(){
  const q=qzState.questions[qzState.cur];const t=qzState.questions.length;const pct=Math.round(qzState.cur/t*100);
  document.getElementById('qzPText').textContent=`Questão ${qzState.cur+1} de ${t}`;document.getElementById('qzPPct').textContent=pct+'%';document.getElementById('qzPBar').style.width=pct+'%';
  const L=['A','B','C','D'];
  document.getElementById('qzArea').innerHTML=`<div class="qz-card"><div class="qz-num">Questão ${qzState.cur+1}</div><div class="qz-text">${q.text}</div><div class="qz-opts">${q.opts.map((o,i)=>`<div class="qz-opt" onclick="selQzOpt(${i},this)" data-i="${i}"><div class="qz-letter">${L[i]}</div><span>${o}</span></div>`).join('')}</div><div class="qz-explain" id="qzExp">${q.exp}</div></div>`;
  document.getElementById('qzCheckBtn').style.display='none';document.getElementById('qzNextBtn').style.display='none';
}
function selQzOpt(i,el){if(el.closest('.qz-card').querySelector('.correct,.wrong'))return;el.closest('.qz-opts').querySelectorAll('.qz-opt').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');document.getElementById('qzCheckBtn').style.display='inline-flex'}
function checkQz(){
  const q=qzState.questions[qzState.cur];const sel=document.querySelector('.qz-opt.selected');if(!sel)return;const idx=+sel.dataset.i;
  document.querySelectorAll('.qz-opt').forEach((o,i)=>{if(i===q.correct)o.classList.add('correct');if(i===idx&&i!==q.correct)o.classList.add('wrong');o.style.cursor='default'});
  if(idx===q.correct)qzState.score++;document.getElementById('qzExp').classList.add('show');
  document.getElementById('qzCheckBtn').style.display='none';document.getElementById('qzNextBtn').style.display='inline-flex';
  document.getElementById('qzNextBtn').textContent=qzState.cur===qzState.questions.length-1?'Ver resultado':'Próxima →';
}
function nextQz(){qzState.cur++;if(qzState.cur>=qzState.questions.length){finQz();return}showQz()}
function finQz(){
  clearInterval(qzState.timer);document.getElementById('qzActive').style.display='none';const t=qzState.questions.length;const pct=Math.round(qzState.score/t*100);const m=Math.floor(qzState.seconds/60);const s=qzState.seconds%60;
  document.getElementById('qzScoreVal').textContent=pct+'%';document.getElementById('qzScoreVal').style.color=pct>=70?'var(--sage)':pct>=50?'var(--amber)':'var(--clay)';
  document.getElementById('qzScoreLabel').textContent=pct>=70?'Excelente!':pct>=50?'Bom, pode melhorar!':'Revise e tente novamente.';
  document.getElementById('qzOk').textContent=qzState.score;document.getElementById('qzErr').textContent=t-qzState.score;document.getElementById('qzTime').textContent=m+':'+s.toString().padStart(2,'0');
  document.getElementById('qzResult').style.display='';
}

      <div class="card-label">Progresso por matéria</div>
      <div style="display:flex;flex-direction:column;gap:var(--s4);margin-top:var(--s4)">${subjects.map(s=>`<div class="progress"><div class="progress-header"><span>${s.icon} ${s.name}</span><span style="font-weight:600;color:var(--${s.color})">${s.progress}%</span></div><div class="progress-track" style="height:8px"><div class="progress-fill ${s.color}" style="width:${s.progress}%"></div></div></div>`).join('')}</div>
    </div>`;
}

      <div class="field" style="margin-bottom:var(--s4)"><label class="field-label">Curso</label><select class="select" id="cfgCourse">${courseKeys.map(k=>`<option value="${k}" ${profile.course===k?'selected':''}>${COURSES[k].icon} ${COURSES[k].name}</option>`).join('')}</select></div>

    </div>
    <div class="card" style="max-width:560px;margin-bottom:var(--s5)">
      <div style="font-weight:600;font-size:15px;margin-bottom:var(--s4)">Preferências</div>

      <div style="display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s4)"><button class="toggle" onclick="this.classList.toggle('active')"></button><span style="font-size:13px">Modo escuro</span></div>

        <button class="btn btn-secondary btn-sm" onclick="const d=JSON.stringify({profile,subjects,notes,schedule});navigator.clipboard.writeText(d);alert('Dados copiados!')">Exportar dados</button>
        <button class="btn btn-danger btn-sm" onclick="if(confirm('Excluir todos os dados?')){localStorage.clear();location.reload()}">Resetar conta</button>

// ============================================================
// AI ASSISTANT
// ============================================================
function toggleAI(){aiOpen=!aiOpen;document.getElementById('aiPanel').classList.toggle('open',aiOpen)}
function addAIMessage(type,text){
  const el=document.getElementById('aiMessages');
  el.innerHTML+=`<div class="ai-msg ${type}">${text}</div>`;
  el.scrollTop=el.scrollHeight;
}
function sendAI(){
  const input=document.getElementById('aiInput');const msg=input.value.trim();if(!msg)return;
  addAIMessage('user',msg);input.value='';
  document.getElementById('aiTyping').classList.add('show');
  setTimeout(()=>{
    document.getElementById('aiTyping').classList.remove('show');
    const resp=generateAIResponse(msg);
    addAIMessage('bot',resp);
  },800+Math.random()*1200);
}
function generateAIResponse(q){
  const ql=q.toLowerCase();const cd=getCourseData();
  // Match subject
  for(const fc of cd.flashcards){
    if(ql.includes(fc.s.toLowerCase().split(' ')[0])||fc.q.toLowerCase().split(' ').some(w=>w.length>4&&ql.includes(w))){
      return `<strong>${fc.s}</strong><br><br>${fc.a}<br><br><em>Dica: revise este tema nos flashcards!</em>`;
    }
  }
  for(const qz of cd.quizzes){
    if(qz.text.toLowerCase().split(' ').filter(w=>w.length>4).some(w=>ql.includes(w))){
      return `Boa pergunta! Sobre "${qz.text.substring(0,50)}..."<br><br>A resposta correta é: <strong>${qz.opts[qz.correct]}</strong><br><br>${qz.exp}`;
    }
  }
  // Subject match
  for(const s of subjects){
    if(ql.includes(s.name.toLowerCase().split(' ')[0])){
      return `Sobre <strong>${s.name}</strong>: você tem ${s.topics.length} tópicos cadastrados: ${s.topics.join(', ')}.<br><br>Recomendo revisar usando os flashcards e depois testar no simulado!`;
    }
  }
  // Generic helpful responses
  const tips=[
    `Boa pergunta! Para ${profile.courseName}, recomendo:<br><br>1. Revise os <strong>flashcards</strong> diariamente<br>2. Faça <strong>simulados</strong> semanais<br>3. Use o <strong>Pomodoro</strong> para manter o foco<br>4. Anote os pontos difíceis nas <strong>Notas</strong>`,
    `Não encontrei uma resposta específica, mas posso ajudar com:<br><br>• Pergunte sobre qualquer <strong>matéria</strong> do seu curso<br>• Peça explicação sobre <strong>temas</strong> dos flashcards<br>• Tire dúvidas sobre <strong>questões</strong> do simulado<br><br>Tente ser mais específico!`,
    `Para estudar de forma eficiente em ${profile.courseName}:<br><br>• <strong>Revisão espaçada</strong>: use os flashcards regularmente<br>• <strong>Prática ativa</strong>: faça simulados ao invés de só ler<br>• <strong>Técnica Pomodoro</strong>: 25min de foco + 5min de pausa<br>• <strong>Elaboração</strong>: explique o conteúdo com suas palavras nas notas`
  ];
  return tips[Math.floor(Math.random()*tips.length)];
}
